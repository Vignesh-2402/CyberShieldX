<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>⚠️ CyberShield X — Threat Blocked</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0f;
      color: #e0e0e0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Animated grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,30,30,0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,30,30,0.05) 1px, transparent 1px);
      background-size: 40px 40px;
      animation: gridScroll 20s linear infinite;
      z-index: 0;
    }

    @keyframes gridScroll {
      0% { transform: translateY(0); }
      100% { transform: translateY(40px); }
    }

    /* Scanline overlay */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.15) 2px,
        rgba(0,0,0,0.15) 4px
      );
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 640px;
      width: 90%;
      background: rgba(255, 10, 10, 0.04);
      border: 1px solid rgba(255, 30, 30, 0.3);
      border-radius: 16px;
      padding: 48px 40px;
      text-align: center;
      backdrop-filter: blur(20px);
      box-shadow:
        0 0 60px rgba(255, 30, 30, 0.15),
        0 0 120px rgba(255, 30, 30, 0.05),
        inset 0 1px 0 rgba(255,255,255,0.05);
      animation: fadeIn 0.5s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.96) translateY(10px); }
      to   { opacity: 1; transform: scale(1)    translateY(0); }
    }

    .shield-icon {
      font-size: 72px;
      line-height: 1;
      margin-bottom: 8px;
      filter: drop-shadow(0 0 20px rgba(255,50,50,0.6));
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); filter: drop-shadow(0 0 20px rgba(255,50,50,0.6)); }
      50% { transform: scale(1.05); filter: drop-shadow(0 0 30px rgba(255,50,50,0.9)); }
    }

    .badge {
      display: inline-block;
      background: rgba(255,30,30,0.15);
      border: 1px solid rgba(255,30,30,0.4);
      color: #ff4444;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      padding: 4px 12px;
      border-radius: 100px;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 28px;
      font-weight: 700;
      color: #ffffff;
      margin-bottom: 10px;
      text-shadow: 0 0 20px rgba(255,50,50,0.5);
    }

    .subtitle {
      color: #888;
      font-size: 14px;
      margin-bottom: 32px;
      line-height: 1.6;
    }

    .info-card {
      background: rgba(0,0,0,0.3);
      border: 1px solid rgba(255,30,30,0.2);
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 24px;
      text-align: left;
    }

    .info-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 8px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .info-row:last-child { border-bottom: none; }

    .info-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: #666;
      min-width: 80px;
      padding-top: 2px;
    }

    .info-value {
      font-size: 13px;
      color: #ccc;
      word-break: break-all;
      flex: 1;
    }

    .info-value.danger { color: #ff6666; }

    .actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .btn-primary {
      background: linear-gradient(135deg, #1a6b3c, #0d4f2c);
      color: #4ade80;
      border: 1px solid rgba(74,222,128,0.3);
    }

    .btn-primary:hover {
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: #fff;
      box-shadow: 0 0 20px rgba(74,222,128,0.4);
      transform: translateY(-1px);
    }

    .btn-secondary {
      background: rgba(255,255,255,0.05);
      color: #888;
      border: 1px solid rgba(255,255,255,0.1);
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.1);
      color: #ccc;
      transform: translateY(-1px);
    }

    .btn-danger {
      background: rgba(255,30,30,0.1);
      color: #ff6666;
      border: 1px solid rgba(255,30,30,0.3);
    }

    .btn-danger:hover {
      background: rgba(255,30,30,0.2);
      color: #ff9999;
      box-shadow: 0 0 15px rgba(255,30,30,0.3);
      transform: translateY(-1px);
    }

    .timestamp {
      margin-top: 24px;
      font-size: 11px;
      color: #444;
    }

    .proceed-warning {
      display: none;
      margin-top: 16px;
      padding: 12px 16px;
      background: rgba(255,150,0,0.1);
      border: 1px solid rgba(255,150,0,0.3);
      border-radius: 8px;
      font-size: 12px;
      color: #ffaa44;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="shield-icon">🛡️</div>
    <div class="badge">Threat Blocked</div>
    <h1>Dangerous Site Blocked</h1>
    <p class="subtitle">CyberShield X detected a threat and protected you from accessing this site.</p>

    <div class="info-card">
      <div class="info-row">
        <span class="info-label">URL</span>
        <span class="info-value danger" id="blocked-url">—</span>
      </div>
      <div class="info-row">
        <span class="info-label">Reason</span>
        <span class="info-value" id="block-reason">—</span>
      </div>
      <div class="info-row">
        <span class="info-label">Log ID</span>
        <span class="info-value" id="log-id">—</span>
      </div>
      <div class="info-row">
        <span class="info-label">Blocked</span>
        <span class="info-value" id="block-time">—</span>
      </div>
    </div>

    <div class="actions">
      <button class="btn btn-primary" onclick="goHome()">🏠 Go to Home</button>
      <button class="btn btn-secondary" onclick="goBack()">← Go Back</button>
      <button class="btn btn-danger" onclick="showProceedWarning()">⚠️ Proceed Anyway</button>
    </div>

    <div class="proceed-warning" id="proceed-warning">
      <strong>Are you sure?</strong> This site has been flagged as dangerous. Proceeding may expose you to malware, phishing, or data theft.<br><br>
      <button class="btn btn-danger" onclick="proceedAnyway()" style="margin-top:8px; font-size:12px; padding: 8px 16px;">
        I understand the risk — proceed
      </button>
    </div>

    <p class="timestamp" id="timestamp"></p>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const blockedUrl = decodeURIComponent(params.get("url") || "Unknown URL");
    const reason = decodeURIComponent(params.get("reason") || "Threat detected");
    const logId = params.get("id") || "—";

    document.getElementById("blocked-url").textContent = blockedUrl;
    document.getElementById("block-reason").textContent = reason;
    document.getElementById("log-id").textContent = `#${logId}`;
    document.getElementById("block-time").textContent = new Date().toLocaleString();
    document.getElementById("timestamp").textContent = `CyberShield X • Incident logged at ${new Date().toISOString()}`;

    function goHome() {
      window.location.href = "https://www.google.com";
    }

    function goBack() {
      if (history.length > 1) {
        history.back();
      } else {
        window.close();
      }
    }

    function showProceedWarning() {
      const w = document.getElementById("proceed-warning");
      w.style.display = w.style.display === "block" ? "none" : "block";
    }

    function proceedAnyway() {
      window.location.href = blockedUrl;
    }
  </script>
</body>
</html>
