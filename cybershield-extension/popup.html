<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CyberShield X</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 340px;
      min-height: 480px;
      background: #0a0a0f;
      color: #e0e0e0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 13px;
    }

    .header {
      background: linear-gradient(135deg, rgba(0,200,255,0.08), rgba(100,0,255,0.08));
      border-bottom: 1px solid rgba(0,200,255,0.15);
      padding: 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-icon { font-size: 24px; }

    .logo-text h1 {
      font-size: 14px;
      font-weight: 700;
      color: #00c8ff;
    }

    .logo-text p {
      font-size: 10px;
      color: #555;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .toggle-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .toggle-label { font-size: 11px; color: #666; }

    .toggle {
      position: relative;
      width: 40px;
      height: 22px;
    }

    .toggle input { opacity: 0; width: 0; height: 0; }

    .slider {
      position: absolute;
      inset: 0;
      background: #222;
      border-radius: 22px;
      cursor: pointer;
      transition: 0.3s;
      border: 1px solid #333;
    }

    .slider::before {
      content: '';
      position: absolute;
      width: 16px;
      height: 16px;
      left: 2px;
      top: 2px;
      background: #555;
      border-radius: 50%;
      transition: 0.3s;
    }

    input:checked + .slider { background: rgba(0,200,100,0.2); border-color: #00c864; }
    input:checked + .slider::before { transform: translateX(18px); background: #00c864; }

    .status-bar {
      padding: 10px 16px;
      background: rgba(0,200,100,0.05);
      border-bottom: 1px solid rgba(255,255,255,0.05);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #00c864;
      box-shadow: 0 0 6px #00c864;
      animation: blink 2s infinite;
    }

    .status-dot.off { background: #444; box-shadow: none; animation: none; }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .status-text { font-size: 12px; color: #888; }
    .status-text strong { color: #00c864; }

    .stats-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .stat {
      padding: 14px 12px;
      text-align: center;
      border-right: 1px solid rgba(255,255,255,0.05);
    }

    .stat:last-child { border-right: none; }

    .stat-num {
      font-size: 22px;
      font-weight: 700;
      color: #00c8ff;
      line-height: 1;
    }

    .stat-num.red { color: #ff4444; }
    .stat-label { font-size: 10px; color: #555; margin-top: 4px; text-transform: uppercase; letter-spacing: 0.5px; }

    .section-title {
      padding: 12px 16px 6px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #444;
    }

    .log-list {
      max-height: 180px;
      overflow-y: auto;
      padding: 0 8px 8px;
    }

    .log-list::-webkit-scrollbar { width: 4px; }
    .log-list::-webkit-scrollbar-track { background: transparent; }
    .log-list::-webkit-scrollbar-thumb { background: #222; border-radius: 2px; }

    .log-item {
      padding: 8px 10px;
      border-radius: 6px;
      border: 1px solid rgba(255,30,30,0.15);
      background: rgba(255,30,30,0.04);
      margin-bottom: 4px;
    }

    .log-item-host {
      font-size: 12px;
      color: #ff6666;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .log-item-meta {
      font-size: 10px;
      color: #555;
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .empty-log {
      text-align: center;
      padding: 24px;
      color: #444;
      font-size: 12px;
    }

    .actions {
      padding: 8px;
      display: flex;
      gap: 6px;
      border-top: 1px solid rgba(255,255,255,0.05);
    }

    .btn {
      flex: 1;
      padding: 9px 6px;
      border-radius: 7px;
      border: none;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-cyan {
      background: rgba(0,200,255,0.1);
      color: #00c8ff;
      border: 1px solid rgba(0,200,255,0.2);
    }

    .btn-cyan:hover { background: rgba(0,200,255,0.2); }

    .btn-red {
      background: rgba(255,30,30,0.1);
      color: #ff6666;
      border: 1px solid rgba(255,30,30,0.2);
    }

    .btn-red:hover { background: rgba(255,30,30,0.2); }
  </style>
</head>
<body>

  <div class="header">
    <div class="logo">
      <span class="logo-icon">🛡️</span>
      <div class="logo-text">
        <h1>CyberShield X</h1>
        <p>Edge Protection</p>
      </div>
    </div>
    <div class="toggle-wrap">
      <span class="toggle-label" id="toggle-label">ON</span>
      <label class="toggle">
        <input type="checkbox" id="blocking-toggle" checked />
        <span class="slider"></span>
      </label>
    </div>
  </div>

  <div class="status-bar">
    <div class="status-dot" id="status-dot"></div>
    <span class="status-text" id="status-text"><strong>Active</strong> — Monitoring all tabs</span>
  </div>

  <div class="stats-row">
    <div class="stat">
      <div class="stat-num red" id="total-blocked">0</div>
      <div class="stat-label">Blocked</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="today-blocked">0</div>
      <div class="stat-label">Today</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="total-scanned">—</div>
      <div class="stat-label">Sessions</div>
    </div>
  </div>

  <div class="section-title">Recent Threats</div>
  <div class="log-list" id="log-list">
    <div class="empty-log">No threats detected yet 🎉</div>
  </div>

  <div class="actions">
    <button class="btn btn-cyan" id="export-btn">📥 Export Log</button>
    <button class="btn btn-red" id="clear-btn">🗑 Clear Log</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
